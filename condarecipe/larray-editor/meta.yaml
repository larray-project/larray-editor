{% set version = "0.35" %}

package:
  name: larray-editor
  version: {{ version }}

source:
  git_tag: {{ version }}
  git_url: https://github.com/larray-project/larray-editor.git

build:
  noarch: python
  number: 0
  entry_points:
    - larray-editor = larray_editor.start:main

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools

  run:
    - python >=3.9
    # We often require new functionality in larray X.Y for larray-editor X.Y
    # because we develop both in parallel, but currently we CANNOT require
    # larray >=X.Y for larray-editor X.Y because larray-editor X.Y must be
    # released before larray X.Y (to include its changelog) so we need to
    # vendor new larray features in larray-editor and only require
    # larray >=X.Y-1
    - larray >=0.35
    # it is indirectly pulled from larray, but let us be explicit about this
    - numpy >=1.22
    - matplotlib
    - pyqt >=5
    - qtpy >=2  # for Qt6 support
    - qt >=5.11
    # jedi >=0.18 to workaround incompatibility between jedi <0.18 and parso >=0.8 (see #220)
    - jedi >=0.18
    - qtconsole !=5.4.2

test:
  imports:
    - larray_editor

app:
  entry: larray-editor
  # icon: larray.png
  summary: "Graphical User Interface for LArray"
  type: desk

about:
  home: https://github.com/larray-project/larray-editor
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE
  summary: "Graphical User Interface for LArray"
  dev_url: https://github.com/larray-project/larray-editor

extra:
  recipe-maintainers:
    - alixdamman
    - gdementen
